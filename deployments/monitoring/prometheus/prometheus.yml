global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'nats'
    static_configs:
      - targets: ['nats-exporter:7777']

  - job_name: 'notification-service'
    static_configs:
      - targets: ['notification:2112']

  - job_name: 'board-service'
    static_configs:
      - targets: ['board:2112']
