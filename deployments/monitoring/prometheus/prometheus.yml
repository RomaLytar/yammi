global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'nats'
    static_configs:
      - targets: ['nats-exporter:7777']

  - job_name: 'notification-api'
    static_configs:
      - targets: ['notification-api:2112']

  - job_name: 'notification-consumer'
    static_configs:
      - targets: ['notification-consumer:2113']

  - job_name: 'board-service'
    static_configs:
      - targets: ['board:2112']

  - job_name: 'comment-service'
    static_configs:
      - targets: ['comment:2112']
