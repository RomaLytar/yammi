# Rate limiting: 5 upload requests/second per IP, burst до 10.
# Защищает от upload flood через presigned URLs, которые идут мимо api-gateway.
limit_req_zone $binary_remote_addr zone=minio_upload:10m rate=5r/s;

server {
    listen 9090;
    client_max_body_size 55m;

    location / {
        # Rate limit на PUT (upload) запросы
        limit_req zone=minio_upload burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://minio:9000;
        proxy_set_header Host minio:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
