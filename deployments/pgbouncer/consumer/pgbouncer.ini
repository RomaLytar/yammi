[databases]
yammi_notification = host=postgres port=5432 dbname=yammi_notification

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

pool_mode = transaction

; Отдельный pool для NATS consumer — не блокирует API
max_client_conn = 500
default_pool_size = 30
min_pool_size = 10
reserve_pool_size = 5
reserve_pool_timeout = 3

server_lifetime = 3600
server_idle_timeout = 600
client_idle_timeout = 0
query_timeout = 30
query_wait_timeout = 30

ignore_startup_parameters = extra_float_digits
max_prepared_statements = 100

log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

admin_users = yammi
