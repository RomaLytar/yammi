[databases]
yammi_auth = host=postgres port=5432 dbname=yammi_auth
yammi_user = host=postgres port=5432 dbname=yammi_user
yammi_board = host=postgres port=5432 dbname=yammi_board
yammi_comment = host=postgres port=5432 dbname=yammi_comment
yammi_notification = host=postgres port=5432 dbname=yammi_notification

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; Transaction pooling — connection возвращается после каждой транзакции.
; pgx driver (не lib/pq) нативно поддерживает transaction mode.
pool_mode = transaction

; Лимиты
max_client_conn = 1000
default_pool_size = 50
min_pool_size = 20
reserve_pool_size = 10
reserve_pool_timeout = 3

; Таймауты
server_lifetime = 3600
server_idle_timeout = 600
client_idle_timeout = 0
query_timeout = 30
query_wait_timeout = 30

; Разрешаем параметры которые Go lib/pq отправляет при подключении
ignore_startup_parameters = extra_float_digits

; Prepared statements в transaction mode — PgBouncer 1.21+
; Кеширует prepared statements на стороне PgBouncer
max_prepared_statements = 100

; Логирование
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

; Админка
admin_users = yammi
