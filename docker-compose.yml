services:
  # --- Infrastructure ---

  postgres:
    image: postgres:16-alpine
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      POSTGRES_USER: yammi
      POSTGRES_PASSWORD: yammi
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yammi"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--jetstream", "-m", "8222"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: yammi
      MINIO_ROOT_PASSWORD: yammipass
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio-proxy:
    image: nginx:alpine
    volumes:
      - ./deployments/nginx/minio-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "9002:9090"
    depends_on:
      minio:
        condition: service_healthy

  pgbouncer:
    image: edoburu/pgbouncer:latest
    volumes:
      - ./deployments/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini
      - ./deployments/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432 -U yammi || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  pgbouncer-consumer:
    image: edoburu/pgbouncer:latest
    volumes:
      - ./deployments/pgbouncer/pgbouncer-consumer.ini:/etc/pgbouncer/pgbouncer.ini
      - ./deployments/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 6432 -U yammi || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Monitoring ---

  nats-exporter:
    image: natsio/prometheus-nats-exporter:latest
    command: ["-varz", "-connz", "-jsz=all", "-subz", "http://nats:8222"]
    depends_on:
      nats:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./deployments/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - nats-exporter

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./deployments/monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./deployments/monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3033:3000"
    depends_on:
      - prometheus

  # --- Services ---

  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    environment:
      AUTH_GRPC_PORT: "50051"
      DATABASE_URL: "postgres://yammi:yammi@pgbouncer:6432/yammi_auth?sslmode=disable"
      MIGRATION_DATABASE_URL: "postgres://yammi:yammi@postgres:5432/yammi_auth?sslmode=disable"
      NATS_URL: "nats://nats:4222"
      BCRYPT_COST: "8"
      JWT_SEED: "QLVciZ5Cbj3PYXfT2U5Y7DTx+30XaoNBcW4zR4i5y/w="
    deploy:
      replicas: 5
    depends_on:
      pgbouncer:
        condition: service_healthy
      nats:
        condition: service_healthy

  user:
    build:
      context: .
      dockerfile: services/user/Dockerfile
    environment:
      USER_GRPC_PORT: "50052"
      DATABASE_URL: "postgres://yammi:yammi@pgbouncer:6432/yammi_user?sslmode=disable"
      MIGRATION_DATABASE_URL: "postgres://yammi:yammi@postgres:5432/yammi_user?sslmode=disable"
      NATS_URL: "nats://nats:4222"
    ports:
      - "50052:50052"
    depends_on:
      pgbouncer:
        condition: service_healthy
      nats:
        condition: service_healthy

  board:
    build:
      context: ./services/board
      dockerfile: Dockerfile
    environment:
      BOARD_GRPC_PORT: "50053"
      DATABASE_URL: "postgres://yammi:yammi@pgbouncer:6432/yammi_board?sslmode=disable"
      MIGRATION_DATABASE_URL: "postgres://yammi:yammi@postgres:5432/yammi_board?sslmode=disable"
      NATS_URL: "nats://nats:4222"
      MINIO_URL: "minio:9000"
      MINIO_PUBLIC_URL: "localhost:9002"
      MINIO_ACCESS_KEY: "yammi"
      MINIO_SECRET_KEY: "yammipass"
    ports:
      - "50053:50053"
    depends_on:
      pgbouncer:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy

  comment:
    build:
      context: .
      dockerfile: services/comment/Dockerfile
    environment:
      COMMENT_GRPC_PORT: "50054"
      DATABASE_URL: "postgres://yammi:yammi@pgbouncer:6432/yammi_comment?sslmode=disable"
      MIGRATION_DATABASE_URL: "postgres://yammi:yammi@postgres:5432/yammi_comment?sslmode=disable"
      NATS_URL: "nats://nats:4222"
      BOARD_GRPC_ADDR: "board:50053"
    ports:
      - "50054:50054"
    depends_on:
      pgbouncer:
        condition: service_healthy
      nats:
        condition: service_healthy

  notification-api:
    restart: unless-stopped
    build:
      context: .
      dockerfile: services/notification/Dockerfile
      target: api
    environment:
      NOTIFICATION_GRPC_PORT: "50055"
      DATABASE_URL: "postgres://yammi:yammi@pgbouncer:6432/yammi_notification?sslmode=disable"
      MIGRATION_DATABASE_URL: "postgres://yammi:yammi@postgres:5432/yammi_notification?sslmode=disable"
      NATS_URL: "nats://nats:4222"
      REDIS_URL: "redis://redis:6379/1"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy

  notification-consumer:
    restart: unless-stopped
    build:
      context: .
      dockerfile: services/notification/Dockerfile
      target: consumer
    environment:
      DATABASE_URL: "postgres://yammi:yammi@pgbouncer-consumer:6432/yammi_notification?sslmode=disable"
      NATS_URL: "nats://nats:4222"
      REDIS_URL: "redis://redis:6379/1"
      METRICS_PORT: "2113"
    deploy:
      replicas: 3
    depends_on:
      pgbouncer-consumer:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    environment:
      GATEWAY_HTTP_PORT: "8080"
      AUTH_GRPC_ADDR: "auth:50051"
      USER_GRPC_ADDR: "user:50052"
      BOARD_GRPC_ADDR: "board:50053"
      COMMENT_GRPC_ADDR: "comment:50054"
      NOTIFICATION_GRPC_ADDR: "notification-api:50055"
      RATE_LIMIT_REGISTER: "${RATE_LIMIT_REGISTER:-50}"
      RATE_LIMIT_LOGIN: "${RATE_LIMIT_LOGIN:-50}"
      RATE_LIMIT_REFRESH: "${RATE_LIMIT_REFRESH:-50}"
      RATE_LIMIT_DEFAULT: "${RATE_LIMIT_DEFAULT:-50}"
    ports:
      - "8080:8080"
    depends_on:
      - auth
      - user
      - board
      - comment
      - notification-api

  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    environment:
      WS_GATEWAY_PORT: "8081"
      NATS_URL: "nats://nats:4222"
      AUTH_PUBLIC_KEY_URL: "http://api-gateway:8080/api/v1/auth/public-key"
    ports:
      - "8081:8081"
    depends_on:
      nats:
        condition: service_healthy
      api-gateway:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
      - gateway

  # --- Tools ---

  dlq:
    build:
      context: ./tools/dlq
      dockerfile: Dockerfile
    environment:
      NATS_URL: "nats://nats:4222"
    profiles: ["tools"]
    depends_on:
      nats:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
