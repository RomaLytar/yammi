// Source of truth: services/board/api/proto/v1/board.proto
// Копия для генерации Go-клиента в api-gateway (отдельный Go module).
syntax = "proto3";

package board.v1;
option go_package = "github.com/RomaLytar/yammi/services/api-gateway/api/proto/v1/board;boardpb";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

service BoardService {
  // Board operations
  rpc CreateBoard(CreateBoardRequest) returns (CreateBoardResponse);
  rpc GetBoard(GetBoardRequest) returns (GetBoardResponse);
  rpc ListBoards(ListBoardsRequest) returns (ListBoardsResponse);
  rpc UpdateBoard(UpdateBoardRequest) returns (UpdateBoardResponse);
  rpc DeleteBoard(DeleteBoardRequest) returns (google.protobuf.Empty);

  // Column operations
  rpc AddColumn(AddColumnRequest) returns (AddColumnResponse);
  rpc GetColumns(GetColumnsRequest) returns (GetColumnsResponse);
  rpc UpdateColumn(UpdateColumnRequest) returns (UpdateColumnResponse);
  rpc DeleteColumn(DeleteColumnRequest) returns (google.protobuf.Empty);
  rpc ReorderColumns(ReorderColumnsRequest) returns (ReorderColumnsResponse);

  // Card operations
  rpc CreateCard(CreateCardRequest) returns (CreateCardResponse);
  rpc GetCard(GetCardRequest) returns (GetCardResponse);
  rpc GetCards(GetCardsRequest) returns (GetCardsResponse);
  rpc UpdateCard(UpdateCardRequest) returns (UpdateCardResponse);
  rpc MoveCard(MoveCardRequest) returns (MoveCardResponse);
  rpc DeleteCard(DeleteCardRequest) returns (google.protobuf.Empty);
  rpc AssignCard(AssignCardRequest) returns (AssignCardResponse);
  rpc UnassignCard(UnassignCardRequest) returns (UnassignCardResponse);
  rpc GetCardActivity(GetCardActivityRequest) returns (GetCardActivityResponse);

  // Member operations
  rpc AddMember(AddMemberRequest) returns (AddMemberResponse);
  rpc RemoveMember(RemoveMemberRequest) returns (google.protobuf.Empty);
  rpc ListMembers(ListMembersRequest) returns (ListMembersResponse);
  rpc IsMember(IsMemberRequest) returns (IsMemberResponse);

  // Attachment operations
  rpc CreateUploadURL(CreateUploadURLRequest) returns (CreateUploadURLResponse);
  rpc ConfirmUpload(ConfirmUploadRequest) returns (ConfirmUploadResponse);
  rpc GetDownloadURL(GetDownloadURLRequest) returns (GetDownloadURLResponse);
  rpc ListAttachments(ListAttachmentsRequest) returns (ListAttachmentsResponse);
  rpc DeleteAttachment(DeleteAttachmentRequest) returns (google.protobuf.Empty);
}

// ============================================================================
// Board Messages
// ============================================================================

message CreateBoardRequest {
  string title = 1;
  string description = 2;
  string owner_id = 3;
}

message CreateBoardResponse {
  Board board = 1;
}

message GetBoardRequest {
  string board_id = 1;
  string user_id = 2;
}

message GetBoardResponse {
  Board board = 1;
  repeated Column columns = 2;
  repeated BoardMember members = 3;
}

message ListBoardsRequest {
  string user_id = 1;
  int32 limit = 2;
  string cursor = 3;
  bool owner_only = 4;
  string search = 5;       // partial title search (ILIKE)
  string sort_by = 6;      // "updated_at" (default), "created_at", "title"
}

message ListBoardsResponse {
  repeated Board boards = 1;
  string next_cursor = 2;  // cursor для следующей страницы
}

message UpdateBoardRequest {
  string board_id = 1;
  string user_id = 2;
  string title = 3;
  string description = 4;
  int32 version = 5;
}

message UpdateBoardResponse {
  Board board = 1;
}

message DeleteBoardRequest {
  repeated string board_ids = 1;
  string user_id = 2;
}

// ============================================================================
// Column Messages
// ============================================================================

message AddColumnRequest {
  string board_id = 1;
  string user_id = 2;
  string title = 3;
  int32 position = 4;
}

message AddColumnResponse {
  Column column = 1;
}

message GetColumnsRequest {
  string board_id = 1;
  string user_id = 2;
}

message GetColumnsResponse {
  repeated Column columns = 1;
}

message UpdateColumnRequest {
  string column_id = 1;
  string board_id = 2;
  string user_id = 3;
  string title = 4;
  int32 version = 5;
}

message UpdateColumnResponse {
  Column column = 1;
}

message DeleteColumnRequest {
  string column_id = 1;
  string board_id = 2;
  string user_id = 3;
}

message ReorderColumnsRequest {
  string board_id = 1;
  string user_id = 2;
  repeated ColumnPosition positions = 3;
  int32 version = 4;
}

message ColumnPosition {
  string column_id = 1;
  int32 position = 2;
}

message ReorderColumnsResponse {
  repeated Column columns = 1;
}

// ============================================================================
// Card Messages
// ============================================================================

message CreateCardRequest {
  string column_id = 1;
  string board_id = 2;
  string user_id = 3;
  string title = 4;
  string description = 5;
  string position = 6;  // lexorank position (string, не int!)
  string assignee_id = 7;  // optional: назначить при создании
}

message CreateCardResponse {
  Card card = 1;
}

message GetCardRequest {
  string card_id = 1;
  string board_id = 2;
  string user_id = 3;
}

message GetCardResponse {
  Card card = 1;
}

message GetCardsRequest {
  string column_id = 1;
  string board_id = 2;
  string user_id = 3;
}

message GetCardsResponse {
  repeated Card cards = 1;
}

message UpdateCardRequest {
  string card_id = 1;
  string board_id = 2;
  string user_id = 3;
  string title = 4;
  string description = 5;
  string assignee_id = 6;
  int32 version = 7;
}

message UpdateCardResponse {
  Card card = 1;
}

message MoveCardRequest {
  string card_id = 1;
  string board_id = 2;
  string from_column_id = 3;
  string to_column_id = 4;
  string position = 5;  // lexorank position (string, не int!)
  string user_id = 6;
  int32 version = 7;
}

message MoveCardResponse {
  Card card = 1;
  repeated Card cards_in_column = 2;
}

message DeleteCardRequest {
  repeated string card_ids = 1;
  string board_id = 2;
  string user_id = 3;
}

message AssignCardRequest {
  string card_id = 1;
  string board_id = 2;
  string user_id = 3;       // actor (from JWT)
  string assignee_id = 4;   // who to assign
}

message AssignCardResponse {
  Card card = 1;
}

message UnassignCardRequest {
  string card_id = 1;
  string board_id = 2;
  string user_id = 3;       // actor
}

message UnassignCardResponse {
  Card card = 1;
}

message GetCardActivityRequest {
  string card_id = 1;
  string board_id = 2;
  string user_id = 3;
  int32 limit = 4;
  string cursor = 5;
}

message GetCardActivityResponse {
  repeated ActivityEntry entries = 1;
  string next_cursor = 2;
}

message ActivityEntry {
  string id = 1;
  string card_id = 2;
  string board_id = 3;
  string actor_id = 4;
  string activity_type = 5;
  string description = 6;
  map<string, string> changes = 7;
  google.protobuf.Timestamp created_at = 8;
}

// ============================================================================
// Member Messages
// ============================================================================

message AddMemberRequest {
  string board_id = 1;
  string user_id = 2;
  string member_user_id = 3;
  string role = 4;
}

message AddMemberResponse {
  BoardMember member = 1;
}

message RemoveMemberRequest {
  string board_id = 1;
  string user_id = 2;
  string member_user_id = 3;
}

message ListMembersRequest {
  string board_id = 1;
  string user_id = 2;
}

message ListMembersResponse {
  repeated BoardMember members = 1;
}

message IsMemberRequest {
  string board_id = 1;
  string user_id = 2;
}

message IsMemberResponse {
  bool is_member = 1;
  string role = 2;  // "owner" or "member", empty if not a member
}

// ============================================================================
// Attachment Messages
// ============================================================================

message CreateUploadURLRequest {
  string card_id = 1;
  string board_id = 2;
  string user_id = 3;
  string file_name = 4;
  string content_type = 5;
  int64 file_size = 6;
}

message CreateUploadURLResponse {
  Attachment attachment = 1;
  string upload_url = 2;
}

message ConfirmUploadRequest {
  string attachment_id = 1;
  string board_id = 2;
  string user_id = 3;
}

message ConfirmUploadResponse {
  Attachment attachment = 1;
}

message GetDownloadURLRequest {
  string attachment_id = 1;
  string board_id = 2;
  string user_id = 3;
}

message GetDownloadURLResponse {
  string download_url = 1;
}

message ListAttachmentsRequest {
  string card_id = 1;
  string board_id = 2;
  string user_id = 3;
}

message ListAttachmentsResponse {
  repeated Attachment attachments = 1;
}

message DeleteAttachmentRequest {
  string attachment_id = 1;
  string board_id = 2;
  string user_id = 3;
}

// ============================================================================
// Domain Models
// ============================================================================

message Board {
  string id = 1;
  string title = 2;
  string description = 3;
  string owner_id = 4;
  int32 version = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message Column {
  string id = 1;
  string board_id = 2;
  string title = 3;
  int32 position = 4;
  int32 version = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
  int32 card_count = 8;
}

message Card {
  string id = 1;
  string column_id = 2;
  string board_id = 3;
  string title = 4;
  string description = 5;
  string position = 6;  // lexorank position (string: "a", "am", "b", ...)
  string assignee_id = 7;
  int32 version = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
  string creator_id = 11;
}

message BoardMember {
  string user_id = 1;
  string role = 2;
  int32 version = 3;
  google.protobuf.Timestamp joined_at = 4;
}

message Attachment {
  string id = 1;
  string card_id = 2;
  string board_id = 3;
  string file_name = 4;
  int64 file_size = 5;
  string mime_type = 6;
  string storage_key = 7;
  string uploader_id = 8;
  google.protobuf.Timestamp created_at = 9;
}
