syntax = "proto3";

package board.v1;
option go_package = "github.com/RomaLytar/yammi/services/board/api/proto/v1;boardpb";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

service BoardService {
  // Board operations
  rpc CreateBoard(CreateBoardRequest) returns (CreateBoardResponse);
  rpc GetBoard(GetBoardRequest) returns (GetBoardResponse);
  rpc ListBoards(ListBoardsRequest) returns (ListBoardsResponse);
  rpc UpdateBoard(UpdateBoardRequest) returns (UpdateBoardResponse);
  rpc DeleteBoard(DeleteBoardRequest) returns (google.protobuf.Empty);

  // Column operations
  rpc AddColumn(AddColumnRequest) returns (AddColumnResponse);
  rpc GetColumns(GetColumnsRequest) returns (GetColumnsResponse);
  rpc UpdateColumn(UpdateColumnRequest) returns (UpdateColumnResponse);
  rpc DeleteColumn(DeleteColumnRequest) returns (google.protobuf.Empty);
  rpc ReorderColumns(ReorderColumnsRequest) returns (ReorderColumnsResponse);

  // Card operations
  rpc CreateCard(CreateCardRequest) returns (CreateCardResponse);
  rpc GetCard(GetCardRequest) returns (GetCardResponse);
  rpc GetCards(GetCardsRequest) returns (GetCardsResponse);
  rpc UpdateCard(UpdateCardRequest) returns (UpdateCardResponse);
  rpc MoveCard(MoveCardRequest) returns (MoveCardResponse);
  rpc DeleteCard(DeleteCardRequest) returns (google.protobuf.Empty);
  rpc AssignCard(AssignCardRequest) returns (AssignCardResponse);
  rpc UnassignCard(UnassignCardRequest) returns (UnassignCardResponse);
  rpc GetCardActivity(GetCardActivityRequest) returns (GetCardActivityResponse);

  // Member operations
  rpc AddMember(AddMemberRequest) returns (AddMemberResponse);
  rpc RemoveMember(RemoveMemberRequest) returns (google.protobuf.Empty);
  rpc ListMembers(ListMembersRequest) returns (ListMembersResponse);
  rpc IsMember(IsMemberRequest) returns (IsMemberResponse);

  // Attachment operations
  rpc CreateUploadURL(CreateUploadURLRequest) returns (CreateUploadURLResponse);
  rpc ConfirmUpload(ConfirmUploadRequest) returns (ConfirmUploadResponse);
  rpc GetDownloadURL(GetDownloadURLRequest) returns (GetDownloadURLResponse);
  rpc ListAttachments(ListAttachmentsRequest) returns (ListAttachmentsResponse);
  rpc DeleteAttachment(DeleteAttachmentRequest) returns (google.protobuf.Empty);

  // Label operations
  rpc CreateLabel(CreateLabelRequest) returns (CreateLabelResponse);
  rpc ListLabels(ListLabelsRequest) returns (ListLabelsResponse);
  rpc UpdateLabel(UpdateLabelRequest) returns (UpdateLabelResponse);
  rpc DeleteLabel(DeleteLabelRequest) returns (google.protobuf.Empty);
  rpc AddLabelToCard(AddLabelToCardRequest) returns (google.protobuf.Empty);
  rpc RemoveLabelFromCard(RemoveLabelFromCardRequest) returns (google.protobuf.Empty);
  rpc GetCardLabels(GetCardLabelsRequest) returns (GetCardLabelsResponse);

  // Card Link operations
  rpc LinkCards(LinkCardsRequest) returns (LinkCardsResponse);
  rpc UnlinkCards(UnlinkCardsRequest) returns (google.protobuf.Empty);
  rpc GetCardChildren(GetCardChildrenRequest) returns (GetCardChildrenResponse);
  rpc GetCardParents(GetCardParentsRequest) returns (GetCardParentsResponse);

  // Checklist operations
  rpc CreateChecklist(CreateChecklistRequest) returns (CreateChecklistResponse);
  rpc GetChecklists(GetChecklistsRequest) returns (GetChecklistsResponse);
  rpc UpdateChecklist(UpdateChecklistRequest) returns (UpdateChecklistResponse);
  rpc DeleteChecklist(DeleteChecklistRequest) returns (google.protobuf.Empty);
  rpc CreateChecklistItem(CreateChecklistItemRequest) returns (CreateChecklistItemResponse);
  rpc UpdateChecklistItem(UpdateChecklistItemRequest) returns (UpdateChecklistItemResponse);
  rpc DeleteChecklistItem(DeleteChecklistItemRequest) returns (google.protobuf.Empty);
  rpc ToggleChecklistItem(ToggleChecklistItemRequest) returns (ToggleChecklistItemResponse);
}

// ============================================================================
// Board Messages
// ============================================================================

message CreateBoardRequest {
  string title = 1;
  string description = 2;
  string owner_id = 3;
}

message CreateBoardResponse {
  Board board = 1;
}

message GetBoardRequest {
  string board_id = 1;
  string user_id = 2;
}

message GetBoardResponse {
  Board board = 1;
  repeated Column columns = 2;
  repeated BoardMember members = 3;
}

message ListBoardsRequest {
  string user_id = 1;
  int32 limit = 2;
  string cursor = 3;
  bool owner_only = 4;
  string search = 5;       // partial title search (ILIKE)
  string sort_by = 6;      // "updated_at" (default), "created_at", "title"
}

message ListBoardsResponse {
  repeated Board boards = 1;
  string next_cursor = 2;  // cursor для следующей страницы
}

message UpdateBoardRequest {
  string board_id = 1;
  string user_id = 2;
  string title = 3;
  string description = 4;
  int32 version = 5;
}

message UpdateBoardResponse {
  Board board = 1;
}

message DeleteBoardRequest {
  repeated string board_ids = 1;
  string user_id = 2;
}

// ============================================================================
// Column Messages
// ============================================================================

message AddColumnRequest {
  string board_id = 1;
  string user_id = 2;
  string title = 3;
  int32 position = 4;
}

message AddColumnResponse {
  Column column = 1;
}

message GetColumnsRequest {
  string board_id = 1;
  string user_id = 2;
}

message GetColumnsResponse {
  repeated Column columns = 1;
}

message UpdateColumnRequest {
  string column_id = 1;
  string board_id = 2;
  string user_id = 3;
  string title = 4;
  int32 version = 5;
}

message UpdateColumnResponse {
  Column column = 1;
}

message DeleteColumnRequest {
  string column_id = 1;
  string board_id = 2;
  string user_id = 3;
}

message ReorderColumnsRequest {
  string board_id = 1;
  string user_id = 2;
  repeated ColumnPosition positions = 3;
  int32 version = 4;
}

message ColumnPosition {
  string column_id = 1;
  int32 position = 2;
}

message ReorderColumnsResponse {
  repeated Column columns = 1;
}

// ============================================================================
// Card Messages
// ============================================================================

message CreateCardRequest {
  string column_id = 1;
  string board_id = 2;
  string user_id = 3;
  string title = 4;
  string description = 5;
  string position = 6;  // lexorank position (string, не int!)
  string assignee_id = 7;  // optional: назначить при создании
  google.protobuf.Timestamp due_date = 8;  // optional: дедлайн
  string priority = 9;    // low, medium, high, critical (default: medium)
  string task_type = 10;   // bug, feature, task, improvement (default: task)
}

message CreateCardResponse {
  Card card = 1;
}

message GetCardRequest {
  string card_id = 1;
  string board_id = 2;
  string user_id = 3;
}

message GetCardResponse {
  Card card = 1;
}

message GetCardsRequest {
  string column_id = 1;
  string board_id = 2;
  string user_id = 3;
}

message GetCardsResponse {
  repeated Card cards = 1;
}

message UpdateCardRequest {
  string card_id = 1;
  string board_id = 2;
  string user_id = 3;
  string title = 4;
  string description = 5;
  string assignee_id = 6;
  int32 version = 7;
  google.protobuf.Timestamp due_date = 8;  // optional: дедлайн
  string priority = 9;    // low, medium, high, critical
  string task_type = 10;   // bug, feature, task, improvement
}

message UpdateCardResponse {
  Card card = 1;
}

message MoveCardRequest {
  string card_id = 1;
  string board_id = 2;
  string from_column_id = 3;
  string to_column_id = 4;
  string position = 5;  // lexorank position (string, не int!)
  string user_id = 6;
  int32 version = 7;
}

message MoveCardResponse {
  Card card = 1;
  repeated Card cards_in_column = 2;
}

message DeleteCardRequest {
  repeated string card_ids = 1;
  string board_id = 2;
  string user_id = 3;
}

message AssignCardRequest {
  string card_id = 1;
  string board_id = 2;
  string user_id = 3;       // actor (from JWT)
  string assignee_id = 4;   // who to assign
}

message AssignCardResponse {
  Card card = 1;
}

message UnassignCardRequest {
  string card_id = 1;
  string board_id = 2;
  string user_id = 3;       // actor
}

message UnassignCardResponse {
  Card card = 1;
}

// ============================================================================
// Activity Messages
// ============================================================================

message GetCardActivityRequest {
  string card_id = 1;
  string board_id = 2;
  string user_id = 3;
  int32 limit = 4;
  string cursor = 5;
}

message GetCardActivityResponse {
  repeated ActivityEntry entries = 1;
  string next_cursor = 2;
}

message ActivityEntry {
  string id = 1;
  string card_id = 2;
  string board_id = 3;
  string actor_id = 4;
  string activity_type = 5;
  string description = 6;
  map<string, string> changes = 7;
  google.protobuf.Timestamp created_at = 8;
}

// ============================================================================
// Member Messages
// ============================================================================

message AddMemberRequest {
  string board_id = 1;
  string user_id = 2;
  string member_user_id = 3;
  string role = 4;
}

message AddMemberResponse {
  BoardMember member = 1;
}

message RemoveMemberRequest {
  string board_id = 1;
  string user_id = 2;
  string member_user_id = 3;
}

message ListMembersRequest {
  string board_id = 1;
  string user_id = 2;
}

message ListMembersResponse {
  repeated BoardMember members = 1;
}

message IsMemberRequest {
  string board_id = 1;
  string user_id = 2;
}

message IsMemberResponse {
  bool is_member = 1;
  string role = 2;  // "owner" or "member", empty if not a member
}

// ============================================================================
// Attachment Messages
// ============================================================================

message CreateUploadURLRequest {
  string card_id = 1;
  string board_id = 2;
  string user_id = 3;
  string file_name = 4;
  string content_type = 5;
  int64 file_size = 6;
}

message CreateUploadURLResponse {
  Attachment attachment = 1;
  string upload_url = 2;
}

message ConfirmUploadRequest {
  string attachment_id = 1;
  string board_id = 2;
  string user_id = 3;
}

message ConfirmUploadResponse {
  Attachment attachment = 1;
}

message GetDownloadURLRequest {
  string attachment_id = 1;
  string board_id = 2;
  string user_id = 3;
}

message GetDownloadURLResponse {
  string download_url = 1;
}

message ListAttachmentsRequest {
  string card_id = 1;
  string board_id = 2;
  string user_id = 3;
}

message ListAttachmentsResponse {
  repeated Attachment attachments = 1;
}

message DeleteAttachmentRequest {
  string attachment_id = 1;
  string board_id = 2;
  string user_id = 3;
}

// ============================================================================
// Domain Models
// ============================================================================

message Board {
  string id = 1;
  string title = 2;
  string description = 3;
  string owner_id = 4;
  int32 version = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message Column {
  string id = 1;
  string board_id = 2;
  string title = 3;
  int32 position = 4;
  int32 version = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
  int32 card_count = 8;
}

message Card {
  string id = 1;
  string column_id = 2;
  string board_id = 3;
  string title = 4;
  string description = 5;
  string position = 6;  // lexorank position (string: "a", "am", "b", ...)
  string assignee_id = 7;
  int32 version = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
  string creator_id = 11;
  google.protobuf.Timestamp due_date = 12;
  string priority = 13;    // low, medium, high, critical
  string task_type = 14;   // bug, feature, task, improvement
}

message BoardMember {
  string user_id = 1;
  string role = 2;
  int32 version = 3;
  google.protobuf.Timestamp joined_at = 4;
}

message Attachment {
  string id = 1;
  string card_id = 2;
  string board_id = 3;
  string file_name = 4;
  int64 file_size = 5;
  string mime_type = 6;
  string storage_key = 7;
  string uploader_id = 8;
  google.protobuf.Timestamp created_at = 9;
}

message Label {
  string id = 1;
  string board_id = 2;
  string name = 3;
  string color = 4;
  google.protobuf.Timestamp created_at = 5;
}

// ============================================================================
// Label Messages
// ============================================================================

message CreateLabelRequest {
  string board_id = 1;
  string user_id = 2;
  string name = 3;
  string color = 4;
}

message CreateLabelResponse {
  Label label = 1;
}

message ListLabelsRequest {
  string board_id = 1;
  string user_id = 2;
}

message ListLabelsResponse {
  repeated Label labels = 1;
}

message UpdateLabelRequest {
  string label_id = 1;
  string board_id = 2;
  string user_id = 3;
  string name = 4;
  string color = 5;
}

message UpdateLabelResponse {
  Label label = 1;
}

message DeleteLabelRequest {
  string label_id = 1;
  string board_id = 2;
  string user_id = 3;
}

message AddLabelToCardRequest {
  string card_id = 1;
  string board_id = 2;
  string label_id = 3;
  string user_id = 4;
}

message RemoveLabelFromCardRequest {
  string card_id = 1;
  string board_id = 2;
  string label_id = 3;
  string user_id = 4;
}

message GetCardLabelsRequest {
  string card_id = 1;
  string board_id = 2;
  string user_id = 3;
}

message GetCardLabelsResponse {
  repeated Label labels = 1;
}

// ============================================================================
// Card Link Messages
// ============================================================================

message CardLink {
  string id = 1;
  string parent_id = 2;
  string child_id = 3;
  string board_id = 4;
  string link_type = 5;
  string child_title = 6;       // denormalized for display
  string child_column_name = 7;  // denormalized for display
  google.protobuf.Timestamp created_at = 8;
}

message LinkCardsRequest {
  string board_id = 1;
  string user_id = 2;
  string parent_id = 3;
  string child_id = 4;
}

message LinkCardsResponse {
  CardLink link = 1;
}

message UnlinkCardsRequest {
  string link_id = 1;
  string board_id = 2;
  string user_id = 3;
}

message GetCardChildrenRequest {
  string card_id = 1;
  string board_id = 2;
  string user_id = 3;
}

message GetCardChildrenResponse {
  repeated CardLink links = 1;
}

message GetCardParentsRequest {
  string card_id = 1;
  string board_id = 2;
  string user_id = 3;
}

message GetCardParentsResponse {
  repeated CardLink links = 1;
}

// ============================================================================
// Checklist Messages
// ============================================================================

message Checklist {
  string id = 1;
  string card_id = 2;
  string board_id = 3;
  string title = 4;
  int32 position = 5;
  repeated ChecklistItem items = 6;
  int32 progress = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message ChecklistItem {
  string id = 1;
  string checklist_id = 2;
  string board_id = 3;
  string title = 4;
  bool is_checked = 5;
  int32 position = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message CreateChecklistRequest {
  string card_id = 1;
  string board_id = 2;
  string user_id = 3;
  string title = 4;
  int32 position = 5;
}

message CreateChecklistResponse {
  Checklist checklist = 1;
}

message GetChecklistsRequest {
  string card_id = 1;
  string board_id = 2;
  string user_id = 3;
}

message GetChecklistsResponse {
  repeated Checklist checklists = 1;
}

message UpdateChecklistRequest {
  string checklist_id = 1;
  string board_id = 2;
  string user_id = 3;
  string title = 4;
}

message UpdateChecklistResponse {
  Checklist checklist = 1;
}

message DeleteChecklistRequest {
  string checklist_id = 1;
  string board_id = 2;
  string user_id = 3;
}

message CreateChecklistItemRequest {
  string checklist_id = 1;
  string board_id = 2;
  string user_id = 3;
  string title = 4;
  int32 position = 5;
}

message CreateChecklistItemResponse {
  ChecklistItem item = 1;
}

message UpdateChecklistItemRequest {
  string item_id = 1;
  string board_id = 2;
  string user_id = 3;
  string title = 4;
}

message UpdateChecklistItemResponse {
  ChecklistItem item = 1;
}

message DeleteChecklistItemRequest {
  string item_id = 1;
  string board_id = 2;
  string user_id = 3;
}

message ToggleChecklistItemRequest {
  string item_id = 1;
  string board_id = 2;
  string user_id = 3;
  bool is_checked = 4;
}

message ToggleChecklistItemResponse {
  bool is_checked = 1;
}
